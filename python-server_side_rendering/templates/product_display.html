<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Products Display</title>
</head>
<body>
    <h1>Product Details</h1>

    {% if error %}
        <h2>{{ error }}</h2>
    
    {% elif products %}
        <table border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product.name }}</td>
                    <td>{{ product.category }}</td>
                    <td>{{ product.price }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <h2>No products available.</h2>
    {% endif %}

</body>
</html>
